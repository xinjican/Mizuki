# 工作流名称：部署到 GitHub Pages（最终稳定版）
name: Deploy to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

# 必须的权限
permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  submodules: true

            # 使用最新版 Node.js 22（解决弃用警告）
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "pnpm"

            # 安装 pnpm
            - name: Install pnpm
              run: npm install -g pnpm

            # 安装依赖
            - name: Install dependencies
              run: pnpm install

            # 构建
            - name: Build
              run: pnpm run build

            # 上传产物
            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: ./dist

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
