name: Deploy to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  submodules: true

            # 1. 安装 pnpm
            - name: Setup pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: latest

            # 2. 安装 Node.js 20 (稳定版)
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "pnpm"

            # 3. 关键：安装依赖并强制安装 sharp，跳过构建失败
            # 这里使用 --ignore-scripts 跳过 postinstall 脚本，避免编译失败
            - name: Install dependencies
              run: pnpm install --shamefully-hoist

            # 4. 强制替换 sharp 为预编译版本 (解决 Linux 编译报错)
            - name: Fix sharp build
              run: pnpm install --os=linux --cpu=x64 sharp

            # 5. 构建
            - name: Build
              run: pnpm run build

            # 6. 上传
            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: ./dist

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
