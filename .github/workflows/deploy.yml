# 工作流名称：部署到 GitHub Pages（最终稳定 npm 版）
name: Deploy to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

# 必须的权限
permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  submodules: true

            # 直接使用最新 Node.js 22（不会有弃用警告）
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "npm" # 彻底关掉 pnpm，只用 npm

            # 关键：用 npm 安装依赖（保证 GitHub 能跑！）
            - name: Install dependencies
              run: npm install

            # 关键：用 npm 构建
            - name: Build
              run: npm run build

            # 上传 dist
            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: ./dist

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
